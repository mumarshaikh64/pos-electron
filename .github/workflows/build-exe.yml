name: Build Windows Installer (.exe)

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build & Package Windows App
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Application
        run: npm run build

      - name: Compile Electron Unpacked
        run: npm run package

      - name: List Release Directory
        shell: powershell
        run: |
          Get-ChildItem -Path release -Recurse

      - name: Extract Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compile Inno Setup Installer
        shell: powershell
        run: |
          echo "Building installer for version ${{ steps.get_version.outputs.version }}"
          iscc /DMyAppVersion="${{ steps.get_version.outputs.version }}" installer.iss

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedicalPOS-Windows-Installer
          path: release/installer/MedicalPOS-Setup.exe
          if-no-files-found: error

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/installer/MedicalPOS-Setup.exe
          tag_name: v${{ steps.get_version.outputs.version }}-${{ github.ref_name }}
          name: MedicalPOS v${{ steps.get_version.outputs.version }} (${{ github.ref_name }})
          draft: false
          prerelease: ${{ github.ref_name == 'dev' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
